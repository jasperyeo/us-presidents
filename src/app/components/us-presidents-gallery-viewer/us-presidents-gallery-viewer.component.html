<div class="viewer__container">
  @if (presidents.length) {
    <list-viewer [mobileView]="mobileView" [data]="presidents"></list-viewer>
  }
  @if (!presidents.length) {
    <div class="viewer__error">
      <div class="viewer__error--message">
        <p>Loading...</p>
      </div>
    </div>
  }
</div>
